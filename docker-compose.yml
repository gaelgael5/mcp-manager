networks:
  mcp-manager-net:
    driver: bridge

services:
  mcp-manager-postgres:
    image: pgvector/pgvector:pg16
    container_name: mcp-manager-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - /opt/mcp-manager-data/postgres:/var/lib/postgresql/data
      - ./backend/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    command:
      - postgres
      - -c
      - shared_preload_libraries=vector
      - -c
      - max_connections=200
      - -c
      - shared_buffers=256MB
      - -c
      - effective_cache_size=1GB
      - -c
      - work_mem=16MB
    healthcheck:
      test: pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    networks:
      - mcp-manager-net

  mcp-backend:
    build: ./backend
    container_name: mcp-backend
    restart: unless-stopped
    ports:
      - "0.0.0.0:8000:8000"
    volumes:
      - ./dockers:/app/dockers:ro
      - ./backend/config:/app/config
      - ./backend/prompts:/app/prompts
      - ./.env:/app/.env
      - /root/.codex:/root/.codex
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      mcp-manager-postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@mcp-manager-postgres:5432/${POSTGRES_DB}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://192.168.10.80:11434}
      OLLAMA_SUMMARY_MODEL: ${OLLAMA_SUMMARY_MODEL:-llama3.1}
      CORS_ORIGINS: '["http://localhost:3001","http://192.168.10.99:3001","https://mcp.yoops.org"]'
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      JWT_SECRET: ${JWT_SECRET:-mcp-manager-jwt-secret}
    healthcheck:
      test: curl -f http://localhost:8000/api/v1/health || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - mcp-manager-net

  mcp-frontend:
    build: ./frontend
    container_name: mcp-frontend
    restart: unless-stopped
    ports:
      - "0.0.0.0:3001:80"
    depends_on:
      - mcp-backend
    networks:
      - mcp-manager-net

  mcp-manager-adminer:
    image: adminer:latest
    container_name: mcp-manager-adminer
    restart: unless-stopped
    ports:
      - "0.0.0.0:8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mcp-manager-postgres
      ADMINER_DESIGN: pepa-linha
    depends_on:
      mcp-manager-postgres:
        condition: service_healthy
    networks:
      - mcp-manager-net

  dozzle-agent:
    image: amir20/dozzle:latest
    container_name: dozzle-agent
    restart: unless-stopped
    command: agent
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "7007:7007"
    networks:
      - mcp-manager-net

  portainer-agent:
    image: portainer/agent:latest
    container_name: portainer-agent
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
    ports:
      - "9001:9001"
    networks:
      - mcp-manager-net
